<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객 정보 수집</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1d4ed8', // 파란색 포인트
            primaryHover: '#1e40af',
          }
        }
      }
    }
  </script>
  <!-- 커스텀 스타일 연동 -->
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 antialiased">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8 transition-all duration-300">
    
    <!-- 1. 입력 폼 영역 -->
    <div id="form-container">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">고객 정보 등록</h1>
        <p class="text-sm text-slate-500 mt-2">안전하고 신속하게 정보를 제출하실 수 있습니다.</p>
      </div>

      <form id="submission-form" novalidate class="space-y-5">
        <!-- 이름 필드 (필수, 50자 이내) -->
        <div>
          <label for="name" class="block text-sm font-semibold text-slate-700 mb-1">
            이름 <span class="text-red-500">*</span>
          </label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="홍길동" 
            maxlength="50"
            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-colors"
          >
          <p id="error-name" class="hidden text-xs text-red-500 mt-1.5"></p>
        </div>

        <!-- 전화번호 필드 (필수, 010-1234-5678 형태) -->
        <div>
          <label for="phone" class="block text-sm font-semibold text-slate-700 mb-1">
            전화번호 <span class="text-red-500">*</span>
          </label>
          <input 
            type="tel" 
            id="phone" 
            name="phone" 
            placeholder="010-1234-5678" 
            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-colors"
          >
          <p id="error-phone" class="hidden text-xs text-red-500 mt-1.5"></p>
        </div>

        <!-- 이메일 필드 (선택, 이메일 형식) -->
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">
            이메일 <span class="text-slate-400 font-normal">(선택)</span>
          </label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="example@email.com" 
            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-colors"
          >
          <p id="error-email" class="hidden text-xs text-red-500 mt-1.5"></p>
        </div>

        <!-- 메모 필드 (선택, 500자 이내, 줄바꿈 가능) -->
        <div>
          <div class="flex justify-between items-center mb-1">
            <label for="memo" class="text-sm font-semibold text-slate-700">
              메모 <span class="text-slate-400 font-normal">(선택)</span>
            </label>
            <span id="char-counter" class="text-xs text-slate-400">0 / 500</span>
          </div>
          <textarea 
            id="memo" 
            name="memo" 
            rows="4" 
            maxlength="500"
            placeholder="메모를 입력해 주세요." 
            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-colors resize-none"
          ></textarea>
          <p id="error-memo" class="hidden text-xs text-red-500 mt-1.5"></p>
        </div>

        <!-- 제출 버튼 -->
        <button 
          type="submit" 
          id="btn-submit"
          class="w-full py-3.5 px-4 bg-primary hover:bg-primaryHover text-white font-semibold rounded-lg shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50 flex items-center justify-center space-x-2"
        >
          <span id="btn-text">정보 제출하기</span>
        </button>

        <!-- 하단 개인정보 안내 문구 -->
        <p class="text-center text-[11px] text-slate-400 leading-normal pt-2">
          입력하신 정보는 안전하게 저장되며 화면에 공개되지 않습니다.
        </p>
      </form>
    </div>

    <!-- 2. 완료 화면 영역 (기본 숨김) -->
    <div id="success-container" class="hidden text-center py-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-50 text-emerald-500 mb-6">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-slate-800 tracking-tight">제출되었습니다 ✓</h2>
      <p class="text-sm text-slate-500 mt-3 mb-8 leading-relaxed">
        보내주신 소중한 정보가 안전하게 전달되었습니다.<br>신속히 검토하도록 하겠습니다.
      </p>
      <button 
        type="button" 
        id="btn-retry"
        class="w-full py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-lg transition-colors focus:outline-none"
      >
        다시 작성하기
      </button>
    </div>

    <!-- 3. 전역 에러 메시지 영역 (기본 숨김) -->
    <div id="error-container" class="hidden mt-6 p-4 bg-red-50 border border-red-100 rounded-lg text-sm text-red-700 leading-relaxed">
      <div class="font-semibold mb-1">안내</div>
      <p id="error-text"></p>
    </div>

  </div>

  <!-- 비즈니스 로직 연동 (ES Modules 방식) -->
  <script type="module" src="./app.js"></script>
</body>
</html>
